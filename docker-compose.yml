services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_DSN=tobedone:tobedone@tcp(mariadb:3306)/tobedone?parseTime=true&charset=utf8mb4
      - SESSION_SECRET=dev-secret-change-me
      - SECURE_COOKIE=false
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=tobedone
      - MYSQL_USER=tobedone
      - MYSQL_PASSWORD=tobedone
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mariadb_data:
